# nginx.conf — HTTP only (used on first deploy to obtain SSL cert)
# After running certbot, replace this file with nginx.ssl.conf

limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot ACME challenge (needed to get SSL cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth rate limiting (10 req/min per IP)
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 520M;
        proxy_read_timeout 300s;
    }

    # WebSocket (indexing progress)
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Static files served by backend
    location /thumbnails/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 7d;
    }
    location /exports/ {
        proxy_pass http://backend;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
