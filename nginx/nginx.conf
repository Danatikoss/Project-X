# nginx.conf — HTTP only (used on first deploy to obtain SSL cert)
# After running certbot, replace this file with nginx.ssl.conf

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# Collabora Online — comment out if not using the slide editor feature
upstream collabora {
    server collabora:9980;
}

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot ACME challenge (needed to get SSL cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 520M;
        proxy_read_timeout 300s;
    }

    # WebSocket (indexing progress)
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Static files served by backend
    location /thumbnails/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 7d;
    }
    location /exports/ {
        proxy_pass http://backend;
    }

    # Collabora Online editor (WebSocket + HTTP)
    # Comment out this block to disable the slide editor feature
    location /collabora/ {
        proxy_pass http://collabora/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
