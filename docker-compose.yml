version: "3.9"

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slidex}
      POSTGRES_USER: ${POSTGRES_USER:-slidex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slidex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - app_data:/app/data      # uploads, thumbnails, exports
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend (built into nginx) ────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped

  # ── nginx reverse proxy + SSL ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # ── Collabora Online (WOPI-based slide editor) ───────────────────────────
  # Feature flag: set COLLABORA_URL + WOPI_BASE_URL in .env to activate.
  # To disable: comment out this service and the nginx /collabora/ block.
  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      # Trust requests coming from our backend
      - aliasgroup1=http://backend:8000
      # SSL is terminated by nginx, so disable it inside Collabora
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
      - username=admin
      - password=${COLLABORA_ADMIN_PASSWORD:-admin}
    cap_add:
      - MKNOD

  # ── Certbot (runs once to get/renew SSL cert) ────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Manual run: docker compose run --rm certbot certonly --webroot ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"

volumes:
  db_data:
  app_data:
  certbot_www:
  certbot_conf:
